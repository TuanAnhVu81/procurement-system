server:
  port: 8080
  servlet:
    context-path: /procurement

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  signer-key: ${JWT_SIGNER_KEY}
  expiration: ${JWT_EXPIRATION}


